documents:
  - id: "doc1"
    text: "Sales refers to the total revenue generated from closed deals, calculated from the active Data Lake dataset's revenue or amount column. The current annual target is set to 500,000 USD."
    metadata:
      category: "finance"
      department: "sales"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Business Glossary"
    keywords: ["sales", "revenue", "target", "deals", "kpi", "kpi target", "борлуулалт", "борлуулалтын", "борлуулалтын орлого"]

  - id: "doc2"
    text: "Churn Rate is the percentage of users who have not made a purchase in over 6 months. The acceptable threshold is under 2.0%."
    metadata:
      category: "finance"
      department: "retention"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Business Glossary"
    keywords: ["churn", "users", "cancel", "subscription", "retention", "percentage"]

  - id: "doc3"
    text: "The Enterprise AI Orchestrator uses a unified Admin access model. All authenticated users have full access to SQL analysis, Python sandboxing, and KPI management."
    metadata:
      category: "business_policy"
      department: "security"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Access Policy"
    keywords: ["policy", "rbac", "admin", "access", "security", "compliance", "unified"]

  - id: "doc4"
    text: "Data Lake Catalog: Use the active uploaded table from the catalog for transaction analytics. Always read the live schema before writing SQL, and do not assume older table names or columns unless they appear in the current catalog."
    metadata:
      category: "data_catalog"
      department: "analytics"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Data Lake Guide"
    keywords: ["catalog", "columns", "sales", "category", "data lake", "sql", "schema"]

  - id: "doc5"
    text: "Data Lake Catalog: Historical trend analysis should use the live catalog entry for the currently loaded dataset. If dates contain dots, normalize them with REPLACE(column, '.', '-') before date grouping."
    metadata:
      category: "data_catalog"
      department: "analytics"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Data Lake Guide"
    keywords: ["catalog", "columns", "order_date", "sales", "category", "data lake", "sql", "date"]

  - id: "doc6"
    text: "SQL Best Practices: Always use ILIKE for case-insensitive text matching. Use DATE_TRUNC for time-series grouping. Use COALESCE to handle null values. Never use backticks — PostgreSQL uses double quotes for identifiers."
    metadata:
      category: "technical"
      department: "engineering"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "SQL Style Guide"
    keywords: ["sql", "ilike", "date_trunc", "coalesce", "postgresql", "best practices", "query"]

  - id: "doc7"
    text: "Dashboard Design: A dashboard consists of 4-6 widgets. Each widget has a type (kpi, bar, line, pie, area), a title in Mongolian, a SQL query, and a unit. KPI widgets return a single number. Bar/Pie charts group by categorical columns. Line/Area charts group by date columns."
    metadata:
      category: "technical"
      department: "engineering"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Dashboard Guide"
    keywords: ["dashboard", "widget", "kpi", "bar", "line", "pie", "chart", "visualization"]

  - id: "doc8"
    text: "Python Analysis: The E2B Sandbox supports pandas, numpy, scikit-learn, statsmodels, scipy, matplotlib, and seaborn. Data is passed as inline JSON. Plots must be saved as 'analysis_plot.png'. Output text is captured from stdout."
    metadata:
      category: "technical"
      department: "engineering"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Sandbox Guide"
    keywords: ["python", "sandbox", "e2b", "pandas", "matplotlib", "plot", "analysis"]

  - id: "glossary_net_profit"
    text: "Business Definition: 'Цэвэр ашиг' (Net Profit) = Нийт орлого (Total Revenue) - Нийт зардал (Total Cost) - Татвар (Tax). Formula: Цэвэр ашиг = revenue - cost - tax. If the dataset has columns like revenue/income, cost/expense, tax columns, net profit can be calculated with: SUM(revenue) - SUM(cost) - SUM(tax)."
    metadata:
      category: "business_policy"
      department: "finance"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Business Glossary"
    keywords: ["цэвэр ашиг", "net profit", "ашиг", "profit", "net income", "формула", "formula", "тооцоо"]

  - id: "glossary_revenue"
    text: "Business Definition: 'Орлого' эсвэл 'Борлуулалтын орлого' (Revenue/Sales) — бараа, үйлчилгээ борлуулснаас олсон нийт мөнгөн дүн. Column mappings: sales, revenue, amount, gross_income, total_income, transaction_amount. SUM дээр бодно. Average Order Value (AOV) = Total Revenue / Total Orders."
    metadata:
      category: "business_policy"
      department: "finance"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Business Glossary"
    keywords: ["орлого", "revenue", "борлуулалт", "sales", "income", "ашиг", "орлогын"]

  - id: "glossary_cost"
    text: "Business Definition: 'Зардал' (Cost/Expense) — бүтээгдэхүүн үйлдвэрлэх, үйлчилгээ үзүүлэхэд гарсан нийт зардал. Column mappings: cost, expense, cogs, cost_of_goods_sold, operating_cost. Цэвэр ашгийг бодоход: revenue - cost - tax."
    metadata:
      category: "business_policy"
      department: "finance"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Business Glossary"
    keywords: ["зардал", "cost", "expense", "cogs", "зарлагын", "шитгэх"]

  - id: "glossary_profit_margin"
    text: "Business Definition: 'Ашгийн хувь' (Profit Margin) = (Цэвэр ашиг / Нийт орлого) * 100. Formula in SQL: (SUM(revenue) - SUM(cost)) / NULLIF(SUM(revenue), 0) * 100. Хэрэв ашгийн хувийг хувиар харуулна. 30% margin гэдэг нь орлогын 30% нь ашиг гэсэн үг."
    metadata:
      category: "business_policy"
      department: "finance"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Business Glossary"
    keywords: ["ашгийн хувь", "profit margin", "margin", "ашиг", "хувь", "percentage", "маржин"]

  - id: "glossary_aov"
    text: "Business Definition: 'Дундаж захиалгын үнэ' (Average Order Value — AOV) = Нийт борлуулалт / Нийт захиалгын тоо. AOV = SUM(sales) / COUNT(order_id). AOV нь харилцагчийн нэг удаагийн худалдан авалтын дундаж дүнг харуулна. AOV өндөр байх тусам харилцагчид илүү үнэтэй бүтээгдэхүүн худалдаж авдаг гэсэн үг."
    metadata:
      category: "business_policy"
      department: "finance"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Business Glossary"
    keywords: ["aov", "average order value", "дундаж", "захиалга", "order", "дундаж үнэ"]

  - id: "glossary_customer_segment"
    text: "Business Definition: 'Харилцагчийн сегмент' (Customer Segment) — харилцагчдыг худалдан авалтын давтамж, зардсан дүнгээр ангилах. Premium: өндөр зарлагатай (>500$), Regular: дунд (100-500$), Budget: бага (<100$). Column mappings in data: segment, customer_segment, tier, class, group, type."
    metadata:
      category: "business_policy"
      department: "sales"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Business Glossary"
    keywords: ["сегмент", "segment", "харилцагч", "customer", "ангилал", "premium", "regular", "budget"]

  - id: "glossary_growth_rate"
    text: "Business Definition: 'Өсөлтийн хувь' (Growth Rate) = (Энэ үеийн утга - Өмнөх үеийн утга) / Өмнөх үеийн утга * 100. Formula: (current_value - previous_value) / previous_value * 100. Monthly Growth Rate = (Энэ сарын борлуулалт - Өмнөх сарын борлуулалт) / Өмнөх сарын борлуулалт * 100. SQL: WITH monthly AS (SELECT DATE_TRUNC('month', order_date) AS month, SUM(sales) AS sales FROM table GROUP BY month) SELECT month, sales, LAG(sales) OVER (ORDER BY month) AS prev_sales, (sales - LAG(sales) OVER (ORDER BY month)) / NULLIF(LAG(sales) OVER (ORDER BY month), 0) * 100 AS growth_rate FROM monthly ORDER BY month."
    metadata:
      category: "business_policy"
      department: "finance"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Business Glossary"
    keywords: ["өсөлт", "growth", "growth rate", "өсөлтийн хувь", "хандлага", "trend", "increase", "өөрчлөлт"]

  - id: "glossary_churn"
    text: "Business Definition: 'Харилцагчийн алдагдал' (Churn) — тухайн хугацаанд үйлчилгээгээ зогсоосон/худалдан авалт хийхээ больсон харилцагчдын эзлэх хувь. Churn Rate = (Алдагдсан харилцагчид / Нийт харилцагчид) * 100. Хэрэв 6 сарын хугацаанд худалдан авалт хийгээгүй бол тухайн харилцагчийг 'churned' гэж үзнэ. Зорилтот түвшин: 2% -иас доош."
    metadata:
      category: "business_policy"
      department: "retention"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Business Glossary"
    keywords: ["churn", "churn rate", "алдагдал", "харилцагч", "retention", "тасралт", "үйлчилгээ"]

  # ── Үйлдвэрлэлийн тооцоо ────────────────────────────────
  - id: "manufacturing_cost"
    text: "Бүтээгдэхүүний өртөг тооцоо: Нийт зардал = Шууд материал + Шууд ажиллах хүч + Ерөнхий үйлдвэрлэлийн зардал (overhead). Нэг бүтээгдэхүүний өртөг = Нийт зардал / Үйлдвэрлэсэн тоо. Нөөцийг хянах: Safety Stock = (Дундаж өдрийн хэрэглээ × Нөхөн сэргээх хугацаа) + Чухал хэрэглээний нөөц. Экономийн захиалгын хэмжээ (EOQ) = √(2DS/H), энд D=жилийн хэрэглээ, S=захиалгын зардал, H=нэг бүрийн хадгаламжийн зардал."
    metadata:
      category: "business_policy"
      department: "manufacturing"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Manufacturing Guide"
    keywords: ["manufacturing", "өртөг", "cost", "production", "үйлдвэрлэл", "material", "labor", "overhead", "EOQ", "safety stock", "нөөц"]

  - id: "inventory_management"
    text: "Агуулахын удирдлага: FIFO (First In First Out) — эхлээд орсон бараа эхлээд гарна. Лайคลын төрөл: A=өндөр үнэ цэнэ (20%), B=дунд (30%), C=бага (50%). Бүх барааг нэгэн төрөл болгох шаардлагагүй — А төрлийг хянахад л хангалттай. Нөөц хэтрэхээс сэргийлэх: нөөцийн эргэлтийн хугацааг хянах (Inventory Days = (Нөөц / Өртгийн зардал) × 365)."
    metadata:
      category: "business_policy"
      department: "operations"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Operations Guide"
    keywords: ["inventory", "нөөц", "warehouse", "агуулах", "FIFO", "ABC analysis", "safety stock", "inventory days"]

  - id: "ifrs_overview"
    text: "IFRS (Олон Улсын Санхүүгийн Тайлагналын Стандарт): IFRS 15 = Орлого: Эцсийн захиалагчтай гэрээнээс орлого таних. IFRS 16 = Түрээс: Бүх түрээсийг баланс дээр харуулна (operating lease ч бас). IAS 2 = Нөөц: Нөөцийг хамгийн бага өртөгөөр (LCM) үнэлнэ. IAS 16 = Биет хөрөнгө: Эхний өртөг + суулгах зардал. IAS 36 = Хөрөнгийн элэгдэл: Нөөц нөлөөллийг шалгана. Монголд MFRS (Монголын Санхүүгийн Тайлагналын Стандарт) нь IFRS-тэй ихэнхдээ таарч байна."
    metadata:
      category: "business_policy"
      department: "accounting"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "IFRS Reference"
    keywords: ["IFRS", "MFRS", "стандарт", "standard", "accounting", "нягтлан", "орлого", "түрээс", "нөөц"]

  - id: "sql_error_resolution"
    text: "SQL Алдаа Засварлах Гарын Авлага: 1) 'relation does not exist' — tabla нэр буруу байна эсвэл CREATE TABLE хийгээгүй байна. 2) 'column does not exist' — баганы нэр буруу эсвэл case-sensitive байна. 3) 'syntax error at' — SQL бичиглэлд алдаа байна —括弧, тасалгал, keywords-ийг шалгана. 4) 'permission denied' — PostgreSQL хэрэглэгчийн эрх хүрэлцэхгүй байна. 5) 'duplicate key' — Primary key давхардсан — ON CONFLICT ашиглах эсвэл өөр ID үүсгэх. 6) 'connection refused' — PostgreSQL ажиллаж байгаа эсэхийг шалгана. 7) 'timeout' — Query хэт удаан — индекс нэмэх эсвэл query optimization хийх."
    metadata:
      category: "data_catalog"
      department: "engineering"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "SQL Best Practices"
    keywords: ["SQL", "error", "алдаа", "засвар", "troubleshooting", "relation", "column", "permission", "timeout"]

  - id: "cash_flow_analysis"
    text: "Мөнгөн урсгалын шинжилгээ: 3 төрлийн мөнгөн урсгал: 1) Үйл ажиллагааны (Operating) — үндсэн бизнесийн мөнгөн урсгал. 2) Хөрөнгө оруулалтын (Investing) — хөрөнгө худалдан авах/зарах. 3. Санхүүжилтийн (Financing) — зээл авах/төлөх, хувьцаа гаргах. Free Cash Flow = Үйл ажиллагааны мөнгөн урсгал - Капиталын зардал. Мөнгөн урсгалын хүрээлэлт: Сар бүр мөнгөн урсгалын урьдчилсан төсөв гаргах — зээлийн хүү төлөх хугацааг мөнгөтэй тохируулах."
    metadata:
      category: "business_policy"
      department: "finance"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Finance Guide"
    keywords: ["cash flow", "мөнгөн урсгал", "free cash flow", "operating", "investing", "financing", "урьдчилсан төсөв"]

  - id: "data_quality_rules"
    text: "Өгөгдлийн чанарын дүрэм: 1) Давхардал шалгах: PRIMARY KEY давхардалгүй байх ёстой. 2) Хоосон утга шалгах: NOT NULL constraint-ийг хэрэглэх. 3) Формат шалгах: Огноо YYYY-MM-DD, дүн тоо байх ёстой. 4) Холболт шалгах: FOREIGN KEY нь parent table-д байх ёстой. 5) Түвшин шалгах: CHECK constraint ашиглах (ж.нь: дүн > 0). 6) Автомат шалгалт: dbt test ашиглах — unique, not_null, accepted_values, relationships. 7) Бичилтийн алдаа: Монгол үсгийн encoding UTF-8 байх ёстой."
    metadata:
      category: "data_catalog"
      department: "engineering"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Data Quality Guide"
    keywords: ["data quality", "чанар", "дүрэм", "validation", "shalgalt", "PRIMARY KEY", "FOREIGN KEY", "dbt test"]

  - id: "financial_ratios_guide"
    text: "Санхүүгийн харьцааны гарын авлага: Ликвид байдал: Current Ratio = Эргэлтийн хөрөнгө / Богино хугацааны өр (1.5+ сайн). Quick Ratio = (Эргэлтийн хөрөнгө - Нөөц) / Богино хугацааны өр (1.0+ сайн). Ашгийн хувь: Gross Margin = (Орлого - Өртөг) / Орлого (40%+ сайн). Net Margin = Цэвэр ашиг / Орлого (10%+ сайн). Өрийн хүндэтгэл: Debt-to-Equity = Нийт пассив / Эцэг хөрөнгө (1.0-аас доош сайн). ROI = (Ашиг - Хөрөнгө оруулалт) / Хөрөнгө оруулалт × 100%."
    metadata:
      category: "business_policy"
      department: "finance"
      author: "admin"
      created_at: "2026-01-01"
      source_name: "Finance Reference"
    keywords: ["ratio", "харьцаа", "current ratio", "quick ratio", "gross margin", "net margin", "debt-to-equity", "ROI", "ликвид"]

  # ── Finance Combined Table (User's actual data) ──────────────────────────
  - id: "finance_combined_schema"
    text: "finance_combined хүснэгтийн бүтэц: date (DATE), customer (VARCHAR), amount (NUMERIC), category (VARCHAR), subcategory (VARCHAR), description (TEXT). Энэ бол хэрэглэгчийн бодит санхүүгийн гүйлгээний өгөгдөл. 186 мөр, 2026-01-05 → 2026-03-38 хугацаатай. date багана нь PostgreSQL DATE төрөлтэй — DATE_TRUNC, EXTRACT, TO_CHAR шууд ашиглах боломжтой. Тэмдэглэх: TO_DATE ашиглах хэрэггүй."
    metadata:
      category: "data_catalog"
      department: "analytics"
      author: "admin"
      created_at: "2026-07-13"
      source_name: "Data Lake Catalog"
    keywords: ["finance_combined", "finance", "combined", "хүснэгт", "schema", "бүтэц", "date", "customer", "amount", "category", "subcategory", "description"]

  - id: "finance_combined_categories"
    text: "finance_combined ангиллууд (category багана): 1) 'Зарлага' — зарцуулсан мөнгө (expense), нийлбэр 214M₮, 155 мөр. Дэд ангилал: Цалин (77.8M₮), Төсөл (52.6M₮), Маркетинг (33.8M₮), Түрээс (25.2M₮), Нийтийн үйлчилгээ (13.2M₮), Бусад зарлага (11.3M₮). 2) 'Үйл ажиллагааны орлого' — үндсэн бизнесийн орлого (operating income), нийлбэр 167M₮, 19 мөр. 3) 'Дотоод шилжүүлэг' — P&L-д орохгүй, зөвхөн мөнгөн урсгал (3 мөр). 4) 'Зээлийн орлого' — зээлийн орлого (1 мөр). 5) 'Эздийн зээл' — хөрөнгө биш, өр төлбөр (5 мөр). 6) 'Бусад орлого' — бусад орлого (2 мөр). Анхаар: 'Дотоод шилжүүлэг', 'Эздийн зээл', 'Зээлийн орлого'-г P&L тооцоонд оруулахгүй."
    metadata:
      category: "data_catalog"
      department: "analytics"
      author: "admin"
      created_at: "2026-07-13"
      source_name: "Data Lake Catalog"
    keywords: ["finance_combined", "зарлага", "орлого", "дотоод шилжүүлэг", "эздийн зээл", "зээлийн орлого", "бусад орлого", "цалин", "төсөл", "маркетинг", "түрээс", "нийтийн үйлчилгээ"]

  - id: "finance_combined_query_patterns"
    text: "finance_combined асуултын загварууд: 'Нийт орлого хэд вэ?' → SELECT SUM(amount) FROM finance_combined WHERE category = 'орлого'. 'Нийт зарлага хэд вэ?' → SELECT SUM(amount) FROM finance_combined WHERE category = 'зарлага'. 'Сараар орлого харуул' → SELECT DATE_TRUNC('month', date), SUM(amount) WHERE category = 'орлого' GROUP BY 1. 'Ангилалаар задал' → SELECT category, SUM(amount) GROUP BY category. 'Харилцагчаар харуул' → SELECT customer, SUM(amount) GROUP BY customer ORDER BY 2 DESC. 'P&L тайлан' → орлого - зарлага - дотоод шилжүүлэг. 'Дундаж гүйлгээний дүн' → SELECT AVG(amount) FROM finance_combined."
    metadata:
      category: "data_catalog"
      department: "analytics"
      author: "admin"
      created_at: "2026-07-13"
      source_name: "Data Lake Catalog"
    keywords: ["finance_combined", "query", "SQL", "асуулт", "загвар", "нийт", "сараар", "ангилалаар", "харилцагчаар", "P&L", "дундаж"]

  - id: "kpi_trend_analysis"
    text: "KPI (Key Performance Indicator) хандлагын шинжилгээ: Өмнөх үетэй харьцуулахдаа LAG() window function ашиглана. Example: LAG(SUM(amount)) OVER (ORDER BY period) AS previous. Өөрчлөлтийн хувь = (current - previous) / NULLIF(previous, 0) * 100. KPI-г dashboard-д widget хэлбэрээр харуулна: trend arrow (↑↓), өөрчлөлтийн хувь, absolute утга."
