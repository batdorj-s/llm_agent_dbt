  - id: "mongolian_tax_calculation"
    text: "Монголын татварын тооцоо: Ашгийн татвар (Corporate Income Tax) = 10% (25% -ийг 2025 оноос хэрэгжүүлэх). Нэмэгдсэн өртгийн татвар (НӨАТ/VAT) = 10%. Нийгмийн даатгалын шимтгэл: Ажил олгогч 11%, Ажилтан 10.5% (цалингаас). Хувь хүний орлогын татвар (ХХОТ) = 10%. Татварын тайлан: Улирал бүр (ашгийн татвар), Сар бүр (НӨАТ, НДШ). Эрх зүйн үндэс: Татварын ерөнхий хууль."
