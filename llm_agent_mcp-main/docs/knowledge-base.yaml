  - id: "vpn_data_security"
    text: "Монголд заавал баримтлах өгөгдлийн аюулгүй байдлын дүрэм: 1) Хувь хүний мэдээлэл (ХХМ) — нэр, хаяг, утас зэргийг шифрлэж хадгалах. 2) Банкны нууц — гүйлгээний мэдээллийг зөвхөн эрхтэй хэрэглэгч харуулах. 3) Өгөгдөл задруулахгүй байх — query result-д мэдээлэл харагдахгүйгээр зөвхөн статистик дүнг харуулах. 4) VPN ашиглах — алсын холболт зөвхөн VPN-ээр. 5) audit log — бүх query-г лог хийх."
