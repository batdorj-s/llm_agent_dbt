version: 2
models:
  - name: stg_sales
    description: Cleaned sales data sourced from data.
    columns:
      - name: date
        description: Column from data.date.
      - name: year
        description: Column from data.year.
      - name: month
        description: Column from data.month.
      - name: month_name
        description: Column from data.month_name.
      - name: week
        description: Column from data.week.
      - name: day_of_week
        description: Column from data.day_of_week.
      - name: post_hour
        description: Column from data.post_hour.
      - name: season
        description: Column from data.season.
      - name: is_holiday
        description: Column from data.is_holiday.
      - name: is_holiday_text
        description: Column from data.is_holiday_text.
      - name: is_weekend
        description: Column from data.is_weekend.
      - name: is_weekend_text
        description: Column from data.is_weekend_text.
      - name: country
        description: Column from data.country.
      - name: market_tier
        description: Column from data.market_tier.
      - name: account
        description: Column from data.account.
      - name: account_type
        description: Column from data.account_type.
      - name: platform
        description: Column from data.platform.
      - name: placement
        description: Column from data.placement.
      - name: funnel_stage
        description: Column from data.funnel_stage.
      - name: objective
        description: Column from data.objective.
      - name: theme
        description: Column from data.theme.
      - name: campaign_id
        description: Column from data.campaign_id.
      - name: campaign_name
        description: Column from data.campaign_name.
      - name: ad_group_id
        description: Column from data.ad_group_id.
      - name: ad_group_name
        description: Column from data.ad_group_name.
      - name: ad_id
        description: Column from data.ad_id.
      - name: ad_name
        description: Column from data.ad_name.
      - name: spend
        description: Column from data.spend.
      - name: impressions
        description: Column from data.impressions.
      - name: reach
        description: Column from data.reach.
      - name: frequency
        description: Column from data.frequency.
      - name: clicks
        description: Column from data.clicks.
      - name: conversions
        description: Column from data.conversions.
      - name: revenue
        description: Column from data.revenue.
      - name: video_views
        description: Column from data.video_views.
    tests:
      - assert_true:
          expression: sales >= 0
          severity: error
  - name: int_sales_enriched
    description: Intermediate model with calculated metrics like profit margin.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
    tests:
      - assert_true:
          expression: profit_margin_pct > -1000
          severity: error
          name: profit_margin_reasonable_lower
      - assert_true:
          expression: profit_margin_pct < 1000
          severity: error
          name: profit_margin_reasonable_upper
  - name: kpi_sales
    description: Daily aggregated sales and profit metrics by category.
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('stg_sales')
      - assert_true:
          expression: total_sales >= 0
          severity: error
  - name: user_metrics
    description: Customer-level metrics.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
    tests:
      - assert_true:
          expression: total_spend >= 0
          severity: error
