version: 2
models:
  - name: stg_sales
    description: Cleaned sales data sourced from test_upload_1782966868758.
    columns:
      - name: date
        description: Column from test_upload_1782966868758.date.
      - name: amount
        description: Column from test_upload_1782966868758.amount.
      - name: customer_id
        description: Column from test_upload_1782966868758.customer_id.
        tests:
          - unique
          - not_null
    tests:
      - assert_true:
          expression: sales >= 0
          severity: error
  - name: int_sales_enriched
    description: Intermediate model with calculated metrics like profit margin.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
    tests:
      - assert_true:
          expression: profit_margin_pct > -1000
          severity: error
          name: profit_margin_reasonable_lower
      - assert_true:
          expression: profit_margin_pct < 1000
          severity: error
          name: profit_margin_reasonable_upper
  - name: kpi_sales
    description: Daily aggregated sales and profit metrics by category.
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('stg_sales')
      - assert_true:
          expression: total_sales >= 0
          severity: error
  - name: user_metrics
    description: Customer-level metrics.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
    tests:
      - assert_true:
          expression: total_spend >= 0
          severity: error

  - name: finance_summary
    description: "Monthly financial summary by category (transactions mart)"
    columns:
      - name: нийт_дүн
        tests:
          - not_null
      - name: нийт_орлого
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"
      - name: нийт_зарлага
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  - name: finance_by_party
    description: "Per-counterparty aggregated transaction summary"
    columns:
      - name: харилцагч
        tests:
          - not_null
      - name: нийт_дүн
        tests:
          - not_null
