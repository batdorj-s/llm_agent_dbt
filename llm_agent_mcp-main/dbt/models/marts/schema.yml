version: 2
models:
  - name: stg_sales
    description: Cleaned sales data sourced from test_chart.
    columns:
      - name: order_id
        description: Column from test_chart.order_id.
        tests:
          - unique
          - not_null
      - name: order_date
        description: Column from test_chart.order_date.
        tests:
          - not_null
      - name: sales
        description: Column from test_chart.sales.
      - name: customer_id
        description: Column from test_chart.customer_id.
        tests:
          - unique
          - not_null
  - name: int_sales_enriched
    description: Intermediate model with calculated metrics like profit margin.
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
  - name: kpi_sales
    description: Daily aggregated sales and profit metrics by category.
    tests:
      - dbt_utils.equal_rowcount:
          compare_model: ref('stg_sales')
  - name: user_metrics
    description: Customer-level metrics.
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
