  Task: {query}

  Your previous SQL query failed with the following error:
  {feedback}

  Please analyze this error and rewrite the SQL query to resolve it.
  Ensure you only use tables and columns available in the schema provided below.
  Do not repeat the same incorrect query.

  IMPORTANT: Never use PostgreSQL function names (TO_DATE, TO_CHAR, EXTRACT, DATE_TRUNC, etc.) as table names, aliases, or CTE names — they will be misinterpreted as table references.

  Common mistakes to avoid:
  - Using TO_DATE() as a table name → Use a descriptive CTE name like "date_converted"
  - Using EXTRACT() as an alias → Use meaningful aliases like "year_extracted"
  - Repeating the exact same SQL that already failed

  --- Schema ---
  {schemaContext}

empty_result_feedback: |
  The SQL executed successfully but returned 0 rows (empty result).

  Common causes and fixes:
  1. Categorical filter mismatch: The filter value may not match the data exactly.
     Fix: Use ILIKE with % wildcards instead of exact = match.
     Example: WHERE "status" ILIKE '%completed%' instead of WHERE "status" = 'Success'

  2. Date column type mismatch: The date column may be INT (Excel serial) or TEXT when you assumed DATE/TIMESTAMP.
     Fix: Check column types in schema and use appropriate conversion:
     - INT: '1899-12-30'::date + "col"::integer
     - TEXT: TO_DATE("col", 'YYYY-MM-DD')

  3. Data capitalization or format differences: Mongolian text may have different cases or formats.
     Fix: Use ILIKE with % wildcards for partial matching.

  Please rewrite the SQL query addressing the most likely cause based on the schema.
