  ```python
  import matplotlib.pyplot as plt
  import seaborn as sns

  plt.style.use('seaborn-v0_8-whitegrid')
  sns.set_palette("husl")
  plt.rcParams['figure.facecolor'] = 'white'
  plt.rcParams['axes.facecolor'] = 'white'
  plt.rcParams['font.size'] = 11
  plt.rcParams['axes.titlesize'] = 14
  plt.rcParams['axes.labelsize'] = 11
  plt.rcParams['xtick.labelsize'] = 9
  plt.rcParams['ytick.labelsize'] = 9
  plt.rcParams['legend.fontsize'] = 10
  plt.rcParams['figure.dpi'] = 150
  ```

  ### Required Plotting Template
  ```python
  fig, ax = plt.subplots(figsize=(10, 6))
  # [YOUR PLOTTING CODE HERE]
  ax.set_title('Title in Mongolian or English', fontsize=14, fontweight='bold')
  ax.set_xlabel('X-axis label', fontsize=11)
  ax.set_ylabel('Y-axis label', fontsize=11)
  ax.grid(True, alpha=0.3, color='#cccccc')
  plt.tight_layout()
  plt.savefig('analysis_plot.png', dpi=150, bbox_inches='tight')
  plt.close()
  ```

  ### Chart Guidelines
  - forecast: Line chart. Historical = solid, forecasted = dashed + confidence shading.
  - cluster: Bar chart. Cluster sizes as bars, optionally avg values per cluster.
  - correlation: Scatter with sns.regplot(). Add correlation coefficient in title.
  - regression: Scatter predicted vs actual. Include R² in title.
  - general: Bar chart for categorical counts or histogram for distributions.

